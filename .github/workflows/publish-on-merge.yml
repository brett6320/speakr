name: Publish image on merge

# On every merge to master, build and publish the full and lite images to GHCR
# for linux/amd64 + linux/arm64. Rolling fork policy: each merge updates `latest`
# (and `lite`) plus an immutable commit-sha tag. Gated on the test suite.
on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: speakr
          POSTGRES_PASSWORD: speakr
          POSTGRES_DB: speakr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U speakr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ffmpeg (needed by stitch / ffprobe tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run full test suite (gates the publish)
        env:
          TEST_DATABASE_URI: postgresql://speakr:speakr@localhost:5432/speakr_test
        run: pytest tests/ -q --cov=src --cov-report=term-missing --cov-fail-under=54

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        variant: [full, lite]

    steps:
      # Free up disk space on the runner (~30GB) for the multi-arch build
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # full → `latest` + sha; lite → `lite` + sha, all suffixed `-lite`.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == 'lite' && '-lite' || '' }}
          tags: |
            type=raw,value=${{ matrix.variant == 'lite' && 'lite' || 'latest' }}
            type=sha

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRODUCTION=1
            ${{ matrix.variant == 'lite' && 'LIGHTWEIGHT=1' || '' }}
