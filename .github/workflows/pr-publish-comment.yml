name: Publish preview image on PR comment

# On-demand PREVIEW publish for a pull request: comment "/publish" and this
# builds the full and lite images (native per-arch) and pushes them to GHCR
# under commit-hash tags — WITHOUT touching `latest`. Full goes to the `<repo>`
# package, lite to the separate `<repo>-lite` package. Lets you pull and run a
# specific PR build before merging:
#   docker pull ghcr.io/<owner>/<repo>:sha-<shorthash>
#   docker pull ghcr.io/<owner>/<repo>-lite:sha-<shorthash>
# The `latest` tag only moves on a real merge to master (publish-on-merge).
#
# Tags applied (same on both packages, no -lite suffix — the package name
# distinguishes them):
#   sha-<shorthash>   (immutable, per PR head commit)
#   pr-<number>       (moves to the latest /publish on this PR)
#
# Note: issue_comment workflows run from the DEFAULT branch, so this file must
# be on master before "/publish" does anything.
on:
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  start:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/publish') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    outputs:
      sha: ${{ steps.info.outputs.sha }}
      short_sha: ${{ steps.info.outputs.short_sha }}
    steps:
      - name: React and mark preview publish pending
        id: info
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const sha = pr.data.head.sha;
            core.setOutput('sha', sha);
            core.setOutput('short_sha', sha.substring(0, 7));
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: 'PR image publish (preview)',
              target_url: runUrl,
              description: 'Publishing preview by digest…'
            });

  # Build each arch natively from the PR HEAD commit and push BY DIGEST (no tag).
  build:
    needs: start
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [full, lite]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache || true
          sudo docker image prune -af || true
          df -h /

      # Build the PR HEAD commit so the sha-<hash> tag matches that exact commit.
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache-from only (no cache-to) to avoid racing publish-on-merge's cache.
      - name: Build and push by digest (${{ matrix.variant }}/${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant == 'lite' && '-lite' || '' }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          build-args: |
            PRODUCTION=1
            ${{ matrix.variant == 'lite' && 'LIGHTWEIGHT=1' || '' }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-preview-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the multi-arch manifest per variant and tag it by hash + PR number.
  # Deliberately does NOT tag `latest`/`lite`.
  merge:
    needs: [start, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [full, lite]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-preview-${{ matrix.variant }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create preview manifest (sha + pr tags only)
        working-directory: ${{ runner.temp }}/digests
        env:
          # Lite publishes to the separate …/speakr-lite package, so its tags
          # need no `-lite` suffix — the package name distinguishes them.
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant == 'lite' && '-lite' || '' }}
          SHORT: ${{ needs.start.outputs.short_sha }}
          PRNUM: ${{ github.event.issue.number }}
          VARIANT: ${{ matrix.variant }}
          TEMP: ${{ runner.temp }}
        run: |
          docker buildx imagetools create \
            -t "${IMG}:sha-${SHORT}" \
            -t "${IMG}:pr-${PRNUM}" \
            $(printf "${IMG}@sha256:%s " *)
          # Capture the published multi-arch manifest digest (the image content
          # hash) so the report step can post it to the PR for exact pinning.
          digest=$(docker buildx imagetools inspect "${IMG}:sha-${SHORT}" --format '{{.Manifest.Digest}}')
          echo "Manifest digest for ${VARIANT}: ${digest}"
          mkdir -p "${TEMP}/manifest"
          printf '%s' "${digest}" > "${TEMP}/manifest/${VARIANT}"

      - name: Upload manifest digest
        uses: actions/upload-artifact@v4
        with:
          name: manifest-digest-${{ matrix.variant }}
          path: ${{ runner.temp }}/manifest/${{ matrix.variant }}
          if-no-files-found: error
          retention-days: 1

  report:
    needs: [start, build, merge]
    if: ${{ always() && needs.start.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Download manifest digests
        if: ${{ needs.merge.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-digest-*
          path: manifests
          merge-multiple: true

      - name: Report result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ok = '${{ needs.build.result }}' === 'success' && '${{ needs.merge.result }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = '${{ needs.start.outputs.sha }}';
            const short = '${{ needs.start.outputs.short_sha }}';
            const img = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}';
            const liteImg = `${img}-lite`;
            const pr = context.issue.number;
            const readDigest = (v) => { try { return fs.readFileSync(`manifests/${v}`, 'utf8').trim(); } catch (e) { return null; } };
            const fullDigest = readDigest('full');
            const liteDigest = readDigest('lite');

            if (sha) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: ok ? 'success' : 'failure',
                context: 'PR image publish (preview)',
                target_url: runUrl,
                description: ok ? `published sha-${short} (+ lite)` : 'preview publish failed'
              });
            }

            let body;
            if (ok) {
              const lines = [
                `✅ **Preview images published** — \`latest\`/\`lite\` are **not** touched (they only move on merge to master/main).`,
                '',
                '| Package | Tag | Digest (image content hash) |',
                '| --- | --- | --- |',
                `| \`${img}\` (full) | \`sha-${short}\` | \`${fullDigest || 'n/a'}\` |`,
                `| \`${liteImg}\` (lite) | \`sha-${short}\` | \`${liteDigest || 'n/a'}\` |`,
                '',
                'Pull by tag, or pin the exact build by digest:',
                '```',
                `docker pull ${img}:sha-${short}`,
                `docker pull ${liteImg}:sha-${short}`,
              ];
              if (fullDigest) lines.push(`docker pull ${img}@${fullDigest}   # full, immutable`);
              if (liteDigest) lines.push(`docker pull ${liteImg}@${liteDigest}   # lite, immutable`);
              lines.push('```', '', `Also tagged \`${img}:pr-${pr}\` / \`${liteImg}:pr-${pr}\` (move to the newest \`/publish\` on this PR). [Logs](${runUrl})`);
              body = lines.join('\n');
            } else {
              body = `❌ \`/publish\` failed — [see the run](${runUrl}).`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });
