name: Build image on PR comment

# On-demand Docker build for a pull request: comment "/build" on the PR and this
# builds the full and lite images for linux/amd64 + linux/arm64 WITHOUT publishing.
# It verifies the Dockerfile still builds (PRs otherwise only run the test suite).
# Note: issue_comment workflows always run from the DEFAULT branch, so this file
# must be on master before "/build" does anything.
on:
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Only react to "/build" comments on a pull request, and only from users with
    # write access (owner / org member / collaborator) to prevent drive-by builds.
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/build') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Acknowledge with a reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      # Free up disk space on the runner (~30GB) for the multi-arch build
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /

      # Build the post-merge state of the PR (refs/pull/N/merge), which is what
      # merging would actually produce.
      - name: Checkout PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build full image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRODUCTION=1

      - name: Build lite image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRODUCTION=1
            LIGHTWEIGHT=1

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = ok
              ? `✅ \`/build\` succeeded — full + lite images build for linux/amd64 and linux/arm64 (not published). [Logs](${runUrl})`
              : `❌ \`/build\` failed — [see the run](${runUrl}).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
