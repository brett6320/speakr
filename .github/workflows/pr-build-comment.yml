name: Build image on PR comment

# On-demand Docker build for a pull request: comment "/build" on the PR and this
# builds the full and lite images for linux/amd64 + linux/arm64 WITHOUT publishing.
# It verifies the Dockerfile still builds (PRs otherwise only run the test suite).
# Note: issue_comment workflows always run from the DEFAULT branch, so this file
# must be on master before "/build" does anything.
on:
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Only react to "/build" comments on a pull request, and only from users with
    # write access (owner / org member / collaborator) to prevent drive-by builds.
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/build') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # Post a commit status on the PR head so the build shows in the PR's
      # checks list (issue_comment runs are otherwise not linked to the PR).
      statuses: write

    steps:
      - name: Acknowledge and mark build pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // React so the commenter sees it was picked up.
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            // Resolve the PR head SHA and publish a pending commit status against
            // it, which surfaces the build in the PR's checks section.
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.exportVariable('PR_HEAD_SHA', pr.data.head.sha);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.data.head.sha,
              state: 'pending',
              context: 'PR image build (amd64+arm64)',
              target_url: runUrl,
              description: 'Building full + lite images…'
            });

      # Free up disk space on the runner (~30GB) for the multi-arch build
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /

      # Build the post-merge state of the PR (refs/pull/N/merge), which is what
      # merging would actually produce.
      - name: Checkout PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build full image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRODUCTION=1

      - name: Build lite image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRODUCTION=1
            LIGHTWEIGHT=1

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // Update the PR-head commit status so the checks list reflects the result.
            const sha = process.env.PR_HEAD_SHA;
            if (sha) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: ok ? 'success' : 'failure',
                context: 'PR image build (amd64+arm64)',
                target_url: runUrl,
                description: ok ? 'full + lite images build' : 'build failed'
              });
            }
            const body = ok
              ? `✅ \`/build\` succeeded — full + lite images build for linux/amd64 and linux/arm64 (not published). [Logs](${runUrl})`
              : `❌ \`/build\` failed — [see the run](${runUrl}).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
